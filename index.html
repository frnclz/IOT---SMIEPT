<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard IoT</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <section class="hero is-fullheight">
    <div class="hero-body">
      <div class="container">
        <h1 class="title has-text-left">
          Sistema de Monitoramento da Integridade Estrutural de Pontes e Trapiches
        </h1>

        <h2 class="subtitle has-text-left mt-3 mb-6">Franciele Alves</h2>
        <!-- Área de exibição do status da conexão MQTT -->
        <div class="box mb-6" style="max-width: 450px; margin-left: 0;">
          <h2 class="title is-5 has-text-centered">Status do Sistema</h2>

          <p id="status" class="has-text-centered status-erro">
            Conectando...
          </p>
        </div>

        <!-- Cards responsáveis por exibir os dados dos sensores -->
        <div class="box">
          <p>Ponte 1</p>
          <div class="columns">
            <div class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen">
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Pilar 1</div>
                <div class="sensor-title">Inclinação</div>
                <div id="pilar1" class="sensor-value">-- °</div>
              </div>
            </div>

            <div class="column is-12-mobile is-6-tablet is-4-desktop is-3-widescreen">
              <div class="card sensor-card has-text-centered p-5">
                <div class="sensor-title">Pilar 3</div>
                <div class="sensor-title">Inclinação</div>
                <div id="pilar2" class="sensor-value">-- °</div>
              </div>
            </div>

            <!-- Cards: Status da Ponte + Cancela -->
            <div class="column">
              <div class="is-flex" style="flex-direction: column; height: 100%; gap: 0.75rem;">
                <div class="card has-text-centered p-3"
                  style="flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0;">
                  <div class="sensor-title">Status da Ponte</div>
                  <div id="status-ponte" class="sensor-value"></div>
                </div>
                <div class="card has-text-centered p-3"
                  style="flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0;">
                  <div class="sensor-title">Cancela</div>
                  <div id="status-cancela" class="sensor-value"></div>
                </div>
              </div>
            </div>
            <div class="column is-flex is-align-items-center is-justify-content-center">
              <button id="btn-alerta" class="button is-danger" disabled>Enviar alerta de ponte interditada</button>
            </div>
          </div>
          <!-- Alerta exibido quando a umidade ultrapassa o limite configurado -->
          <div id="alerta-movimentacao" class="notification is-danger has-text-centered mt-4" style="display: none">
            Alerta: Ponte com movimentação estranha!
          </div>
        </div>
      </div>
    </div>
    </div>
  </section>

  <!-- Biblioteca MQTT para comunicação em tempo real -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script src="app.js"></script>
</body>

</html>
